<!DOCTYPE html>
<html>
<head>
  <title>Complex Table Example</title>
</head>
<body>
  <h2>Complex Table with Rowspan & Colspan</h2>
  <table border="1">
    <tr>
      <th rowspan="2">ID</th>
      <th colspan="2">Name</th>
      <th rowspan="2">Department</th>
      <th rowspan="2">Score</th>
    </tr>
    <tr>
      <th>First</th>
      <th>Last</th>
    </tr>
    <tr>
      <td>1</td>
      <td>John</td>
      <td>Smith</td>
      <td rowspan="2">Computer Science</td>
      <td>85</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Alice</td>
      <td>Brown</td>
      <td>92</td>
    </tr>
    <tr>
      <td>3</td>
      <td>Michael</td>
      <td>Lee</td>
      <td>Mathematics</td>
      <td rowspan="2">78</td>
    </tr>
    <tr>
      <td>4</td>
      <td>Sara</td>
      <td>Khan</td>
      <td>Physics</td>
    </tr>
  </table>
</body>
</html>
